name: Sign and verify containers using keys
on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Git tag for GitHub release'
        required: false
        type: string
env:
  IMAGE_TAG: zig-key
jobs:
  signandverify:
    name: Sign and verify
    permissions:
      packages: write # Push container images to ghcr.io.
    runs-on: ubuntu-24.04
    outputs:
      github_repository: ${{ steps.github_repository.outputs.lc }}
      digest: ${{ steps.image_manifest_ghcr.outputs.digest }}
    env:
      SIGSTORE_PUBLIC_KEY: sigstore.pub
    steps:
      - name: Check buildah version
        id: buildah_version
        run: |
          installed_version=$(buildah version --json | jq -r '.version')
          minimum_required_version='1.35.0'
          if dpkg --compare-versions "$installed_version" lt "$minimum_required_version"; then
              printf '%s=%s\n' 'is_old' 'true' >> "$GITHUB_OUTPUT"
          fi
      # Workaround: Ubuntu 24.04 does not have 1.35.0 version of buildah yet. Which introduces annotation support for image manifests.
      - name: Build buildah from sources
        if: ${{ steps.buildah_version.outputs.is_old }}
        run: |
          sudo apt-get -y remove buildah
          sudo apt-get update -y
          sudo apt-get install -y \
              bats \
              btrfs-progs \
              git \
              go-md2man \
              golang \
              libapparmor-dev \
              libglib2.0-dev \
              libgpgme11-dev \
              libseccomp-dev \
              libselinux1-dev \
              make \
              runc \
              skopeo \
              libbtrfs-dev
          git clone --branch release-1.41 --depth 1 --single-branch https://github.com/containers/buildah
          cd buildah
          make
          sudo make install

      - name: Output installed buildah version
        run: buildah version

      # Workaround: https://github.com/actions/runner-images/issues/10443
      - name: Workaround for Ubuntu 24.04 LTS
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.0.0
        with:
          cosign-release: 'v3.0.2'

      - name: Get zig release tarball
        id: zig_release_tarball
        run: |
          zig_mirror=$(curl -fsSL https://ziglang.org/download/community-mirrors.txt | shuf -n 1)
          zig_version=$(curl -fsSL https://ziglang.org/download/index.json | jq -r '.master.version')
          zig_tarball_x86_64_linux_master="zig-x86_64-linux-${zig_version}.tar.xz"
          printf '%s=%s\n' 'zig_tarball_x86_64_linux_master' "$zig_tarball_x86_64_linux_master" >> "$GITHUB_OUTPUT"
          curl -fsSL "${zig_mirror}/${zig_tarball_x86_64_linux_master}" -o "$zig_tarball_x86_64_linux_master"

      - name: Build a container image
        id: image
        run: |
          buildah unshare ./zig_container.sh ${{ steps.zig_release_tarball.outputs.zig_tarball_x86_64_linux_master }}
          image_digest=$(cat ./image_id.txt)
          printf '%s=%s\n' 'digest' "$image_digest" >> "$GITHUB_OUTPUT"

      - name: Create a image manifest
        id: image_manifest_local
        env:
          MANIFEST_NAME: zig
        run: |
          image_manifest_local_imageid=$(buildah manifest create \
              --annotation \
              org.opencontainers.image.source="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
              ${GITHUB_REPOSITORY##*/}:${MANIFEST_NAME})
          printf '%s=%s\n' 'imageid' "$image_manifest_local_imageid" >> "$GITHUB_OUTPUT"

      - name: Add image into image manifest
        run: |
          buildah manifest add ${{ steps.image_manifest_local.outputs.imageid }} ${{ steps.image.outputs.digest }}
          buildah images
          buildah manifest inspect ${{ steps.image_manifest_local.outputs.imageid }} # DEBUG: Inspect image manifest

      - name: Login to GHCR.io
        run: |
          # GitHub-hosted runners already have a ${HOME}/.docker/config.json with a credential which has unlimited pull rate and limit on Docker Hub.
          # Append the new credential to the same file and tell buildah and its friends (podman, skopeo etc.) to use it.
          printf '%s' "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
          printf '%s=%s\n' 'REGISTRY_AUTH_FILE' "${HOME}/.docker/config.json" >> "$GITHUB_ENV"

      - name: Push image manifest to ghcr.io
        id: image_manifest_ghcr
        run: |
          buildah manifest push \
              --digestfile image_manifest_ghcr_digest.txt \
              ${{ steps.image_manifest_local.outputs.imageid }} \
              docker://ghcr.io/${GITHUB_REPOSITORY,,}:${IMAGE_TAG}
          image_manifest_ghcr_digest=$(cat ./image_manifest_ghcr_digest.txt)
          printf '%s=%s\n' 'digest' "$image_manifest_ghcr_digest" >> "$GITHUB_OUTPUT"

      - name: Sign image manifest on ghcr.io
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          SIGSTORE_PRIVATE_KEY: ${{ secrets.SIGSTORE_PRIVATE_KEY }}
        run: |
          cosign sign \
              --key env://SIGSTORE_PRIVATE_KEY \
              --recursive \
              --yes \
              ghcr.io/${GITHUB_REPOSITORY,,}@${{ steps.image_manifest_ghcr.outputs.digest }}

      - name: Verify image manifest
        run: cosign verify --key sigstore.pub ghcr.io/${GITHUB_REPOSITORY,,}:${IMAGE_TAG} | jq

      - name: Convert gh repository to lowercase
        id: github_repository
        run: printf '%s=%s\n' 'lc' "${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Generate SBOM for container image
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ steps.github_repository.outputs.lc }}:${{ env.IMAGE_TAG }}
          output-file: ./zig-key.spdx.json

      - name: Attest SBOM
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          SIGSTORE_PRIVATE_KEY: ${{ secrets.SIGSTORE_PRIVATE_KEY }}
        run: |
          cosign attest \
              --key env://SIGSTORE_PRIVATE_KEY \
              --predicate zig-key.spdx.json \
              --type spdxjson \
              --yes \
              ghcr.io/${GITHUB_REPOSITORY,,}@${{ steps.image_manifest_ghcr.outputs.digest }}

      - name: Verify attested SBOM
        run: |
          cosign verify-attestation \
              --key "$SIGSTORE_PUBLIC_KEY" \
              --type spdxjson \
              ghcr.io/${GITHUB_REPOSITORY,,}@${{ steps.image_manifest_ghcr.outputs.digest }} \
              | jq -r '.payload' | base64 --decode | jq

      - name: Logout from ghcr.io
        if: ${{ always() }}
        run: docker logout ghcr.io || true

  provenance:
    name: Generate SLSA Build Level 3 provenance
    permissions:
      actions: read # for detecting the Github Actions environment.
      id-token: write # for creating OIDC tokens for signing.
      packages: write # for uploading attestations.
    needs:
      - signandverify
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: ghcr.io/${{ needs.signandverify.outputs.github_repository }}
      digest: ${{ needs.signandverify.outputs.digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  verifyslsaprovenance:
    name: Verify SLSA Provenance
    needs:
      - signandverify
      - provenance
    runs-on: ubuntu-24.04
    env:
      SIGSTORE_PUBLIC_KEY: sigstore.pub
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.0.0
        with:
          cosign-release: 'v3.0.2'

      - name: Download the Provenance
        run: |
          cosign verify-attestation \
              --key "$SIGSTORE_PUBLIC_KEY" \
              --type slsaprovenance02 \
              ghcr.io/${GITHUB_REPOSITORY,,}@${{ needs.signandverify.outputs.digest }} \
              | jq -r '.payload' | base64 --decode | jq

      - name: Install SLSA verifier
        uses: slsa-framework/slsa-verifier/actions/installer@v2.7.1

      - name: Verify Provenance
        run: |
          printf "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
          slsa-verifier verify-image \
              ghcr.io/${GITHUB_REPOSITORY,,}@${{ needs.signandverify.outputs.digest }} \
              --print-provenance \
              --source-uri "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
