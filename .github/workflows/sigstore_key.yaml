name: Sign and verify using keys
on: workflow_dispatch
permissions:
  packages: write
jobs:
  signandverify:
    name: Sign and verify
    runs-on: ubuntu-24.04
    steps:
      # Workaround: Ubuntu 24.04 does not have 1.35 version of buildah yet. Which introduces annotation support for image manifests.
      - name: Build buildah from sources
        run: |
          sudo apt-get -y remove buildah
          sudo apt-get update -y
          sudo apt-get install -y \
              bats \
              btrfs-progs \
              git \
              go-md2man \
              golang \
              libapparmor-dev \
              libglib2.0-dev \
              libgpgme11-dev \
              libseccomp-dev \
              libselinux1-dev \
              make \
              runc \
              skopeo \
              libbtrfs-dev
          git clone --branch release-1.41 --depth 1 --single-branch https://github.com/containers/buildah
          cd buildah
          make
          sudo make install

      - name: Check buildah version
        run: buildah version

      # Workaround: https://github.com/actions/runner-images/issues/10443
      - name: Workaround for Ubuntu 24.04 LTS
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.6.0'

      - name: Get zig release tarball
        id: zig_release_tarball
        run: |
          zig_mirror=$(curl -sS -f https://ziglang.org/download/community-mirrors.txt | shuf -n 1)
          zig_version=$(curl -sS -f https://ziglang.org/download/index.json | jq -r '.master.version')
          zig_tarball_x86_64_linux_master="zig-x86_64-linux-${zig_version}.tar.xz"
          printf '%s=%s\n' 'zig_tarball_x86_64_linux_master' "$zig_tarball_x86_64_linux_master" >> "$GITHUB_OUTPUT"
          curl -sS -f "${zig_mirror}/${zig_tarball_x86_64_linux_master}" -o "$zig_tarball_x86_64_linux_master"

      - name: Sign the zig release tarball
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          SIGSTORE_PRIVATE_KEY: ${{ secrets.SIGSTORE_PRIVATE_KEY }}
        run: |
          cosign sign-blob \
              --key env://SIGSTORE_PRIVATE_KEY \
              ${{ steps.zig_release_tarball.outputs.zig_tarball_x86_64_linux_master }} \
              --bundle ${{ steps.zig_release_tarball.outputs.zig_tarball_x86_64_linux_master }}.sigstore.json \
              --new-bundle-format \
              --yes

      - name: Verify the signed the zig release tarball using public key and sigstore bundle
        run: |
          cosign verify-blob \
              --key sigstore.pub \
              ${{ steps.zig_release_tarball.outputs.zig_tarball_x86_64_linux_master }} \
              --bundle ${{ steps.zig_release_tarball.outputs.zig_tarball_x86_64_linux_master }}.sigstore.json \
              --new-bundle-format

      - name: Build a container image
        id: image
        run: |
          buildah unshare ./zig_container.sh ${{ steps.zig_release_tarball.outputs.zig_tarball_x86_64_linux_master }}
          image_digest=$(cat ./image_id.txt)
          printf '%s=%s\n' 'digest' "$image_digest" >> "$GITHUB_OUTPUT"

      - name: Create a image manifest
        id: image_manifest_local
        env:
          MANIFEST_NAME: zig
        run: |
          image_manifest_local_imageid=$(buildah manifest create \
              --annotation \
              org.opencontainers.image.source="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
              ${GITHUB_REPOSITORY##*/}:${MANIFEST_NAME})
          printf '%s=%s\n' 'imageid' "$image_manifest_local_imageid" >> "$GITHUB_OUTPUT"

      - name: Add image into image manifest
        run: |
          buildah manifest add ${{ steps.image_manifest_local.outputs.imageid }} ${{ steps.image.outputs.digest }}
          buildah images
          buildah manifest inspect ${{ steps.image_manifest_local.outputs.imageid }} # DEBUG: Check for manifest

      - name: Login to GHCR.io
        run: |
          # GitHub-hosted runners already have a ${HOME}/.docker/config.json with a credential which has unlimited pull rate and limit on Docker Hub.
          # Append the new credential to the same file and tell buildah and its friends (podman, skopeo etc.) to use it.
          printf '%s' "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
          printf '%s=%s\n' 'REGISTRY_AUTH_FILE' "${HOME}/.docker/config.json" >> "$GITHUB_ENV"

      - name: Push image manifest to ghcr.io for Cosign-specific bundle format
        id: image_manifest_ghcr_legacy
        env:
          IMG_TAG: zig-key-legacy
        run: |
          buildah manifest push \
              --digestfile image_manifest_ghcr_legacy_digest.txt \
              ${{ steps.image_manifest_local.outputs.imageid }} \
              docker://ghcr.io/${GITHUB_REPOSITORY,,}:${IMG_TAG}
          image_manifest_ghcr_legacy_digest=$(cat ./image_manifest_ghcr_legacy_digest.txt)
          printf '%s=%s\n' 'digest' "$image_manifest_ghcr_legacy_digest" >> "$GITHUB_OUTPUT"

      - name: Push image manifest to ghcr.io for Sigstore Bundle Format
        id: image_manifest_ghcr
        env:
          IMG_TAG: zig-key
        run: |
          buildah manifest push \
              --digestfile image_manifest_ghcr_digest.txt \
              ${{ steps.image_manifest_local.outputs.imageid }} \
              docker://ghcr.io/${GITHUB_REPOSITORY,,}:${IMG_TAG}
          image_manifest_ghcr_digest=$(cat ./image_manifest_ghcr_digest.txt)
          printf '%s=%s\n' 'digest' "$image_manifest_ghcr_digest" >> "$GITHUB_OUTPUT"

      - name: Sign image manifest on ghcr.io in Cosign-specific bundle format
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          SIGSTORE_PRIVATE_KEY: ${{ secrets.SIGSTORE_PRIVATE_KEY }}
        run: |
          cosign sign \
              --key env://SIGSTORE_PRIVATE_KEY \
              --recursive \
              --yes \
              ghcr.io/${GITHUB_REPOSITORY,,}@${{ steps.image_manifest_ghcr_legacy.outputs.digest }}

      - name: Sign image manifest on ghcr.io in Sigstore Bundle Format
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          SIGSTORE_PRIVATE_KEY: ${{ secrets.SIGSTORE_PRIVATE_KEY }}
        run: |
          cosign sign \
              --key env://SIGSTORE_PRIVATE_KEY \
              --recursive \
              --new-bundle-format=true \
              --yes \
              ghcr.io/${GITHUB_REPOSITORY,,}@${{ steps.image_manifest_ghcr.outputs.digest }}

      - name: Verify container image or manifest with public key in Cosign-specific bundle format
        env:
          IMG_TAG: zig-key-legacy
        run: cosign verify --key sigstore.pub ghcr.io/${GITHUB_REPOSITORY,,}:${IMG_TAG}

      - name: Verify container image or manifest with public key in Sigstore Bundle Format
        env:
          IMG_TAG: zig-key
        run: cosign verify --key sigstore.pub --new-bundle-format=true ghcr.io/${GITHUB_REPOSITORY,,}:${IMG_TAG}

      - name: Logout from ghcr.io
        if: ${{ always() }}
        run: docker logout ghcr.io || true
