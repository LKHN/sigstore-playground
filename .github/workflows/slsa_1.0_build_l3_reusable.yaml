name: Reusable workflow to achieve SLSA v1 Build Level 3
on:
  workflow_call:
permissions:
  attestations: write # GitHub Artifact attestations.
  contents: read
  id-token: write # Use GitHub OIDC provider to generate ephemeral keys for signing.
  packages: write # Push container images to ghcr.io.
env:
  IMAGE_TAG: zig-keyless
jobs:
  signandverify:
    name: Sign and verify
    runs-on: ubuntu-24.04
    steps:
      - name: Check buildah version
        id: buildah_version
        run: |
          installed_version=$(buildah version --json | jq -r '.version')
          minimum_required_version='1.35.0'
          if dpkg --compare-versions "$installed_version" lt "$minimum_required_version"; then
              printf '%s=%s\n' 'is_old' 'true' >> "$GITHUB_OUTPUT"
          fi
      # Workaround: Ubuntu 24.04 does not have 1.35 version of buildah yet. Which introduces annotation support for image manifests.
      - name: Build buildah from sources
        run: |
          sudo apt-get -y remove buildah
          sudo apt-get update -y
          sudo apt-get install -y \
              bats \
              btrfs-progs \
              git \
              go-md2man \
              golang \
              libapparmor-dev \
              libglib2.0-dev \
              libgpgme11-dev \
              libseccomp-dev \
              libselinux1-dev \
              make \
              runc \
              skopeo \
              libbtrfs-dev
          git clone --branch release-1.41 --depth 1 --single-branch https://github.com/containers/buildah
          cd buildah
          make
          sudo make install

      - name: Output buildah version
        run: buildah version

      # Workaround: https://github.com/actions/runner-images/issues/10443
      - name: Workaround for Ubuntu 24.04 LTS
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Checkout
        uses: actions/checkout@v5

      # - name: Install Cosign
      #   uses: sigstore/cosign-installer@v3
      #   with:
      #     cosign-release: 'v2.6.1'

      - name: Install Cosign v3
        run: |
          curl -fsSLO https://github.com/sigstore/cosign/releases/download/v3.0.2/cosign_3.0.2_amd64.deb
          sudo apt-get install -y ./cosign_3.0.2_amd64.deb

      - name: Get zig release tarball
        id: zig_release_tarball
        run: |
          zig_mirror=$(curl -fsSL https://ziglang.org/download/community-mirrors.txt | shuf -n 1)
          zig_version=$(curl -fsSL https://ziglang.org/download/index.json | jq -r '.master.version')
          zig_tarball_x86_64_linux_master="zig-x86_64-linux-${zig_version}.tar.xz"
          printf '%s=%s\n' 'zig_tarball_x86_64_linux_master' "$zig_tarball_x86_64_linux_master" >> "$GITHUB_OUTPUT"
          curl -fsSL "${zig_mirror}/${zig_tarball_x86_64_linux_master}" -o "$zig_tarball_x86_64_linux_master"

      - name: Sign the zig release tarball
        run: |
          cosign sign-blob \
              ${{ steps.zig_release_tarball.outputs.zig_tarball_x86_64_linux_master }} \
              --bundle ${{ steps.zig_release_tarball.outputs.zig_tarball_x86_64_linux_master }}.sigstore.json \
              --yes

      - name: Read sigstore bundle
        run: jq '.' ${{ steps.zig_release_tarball.outputs.zig_tarball_x86_64_linux_master }}.sigstore.json

      # Blob, Sigstore Bundle and OIDC Provider (GitHub) are used for verification.

      # https://github.com/<USER>/<REPOSITORY>/.github/workflows/<WORKFLOW>@refs/heads/<BRANCH>
      # In this case: https://github.com/LKHN/sigstore-playground/.github/workflows/sigstore_keyless.yaml@refs/heads/main
      - name: Verify the signed blob against to exact certificate identity
        run: |
          cosign verify-blob \
              ${{ steps.zig_release_tarball.outputs.zig_tarball_x86_64_linux_master }} \
              --bundle ${{ steps.zig_release_tarball.outputs.zig_tarball_x86_64_linux_master }}.sigstore.json \
              --certificate-identity="https://github.com/LKHN/sigstore-playground/.github/workflows/slsa_1.0_build_l3_reusable.yaml@refs/heads/main" \
              --certificate-oidc-issuer=https://token.actions.githubusercontent.com

      # Matches ^https://github.com/LKHN/sigstore-playground
      - name: Verify the signed blob using regular expression
        run: |
          cosign verify-blob \
              ${{ steps.zig_release_tarball.outputs.zig_tarball_x86_64_linux_master }} \
              --bundle ${{ steps.zig_release_tarball.outputs.zig_tarball_x86_64_linux_master }}.sigstore.json \
              --certificate-identity-regexp="^${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
              --certificate-oidc-issuer=https://token.actions.githubusercontent.com

      - name: Build a container image
        id: image
        run: |
          buildah unshare ./zig_container.sh ${{ steps.zig_release_tarball.outputs.zig_tarball_x86_64_linux_master }}
          image_digest=$(cat ./image_id.txt)
          printf '%s=%s\n' 'digest' "$image_digest" >> "$GITHUB_OUTPUT"

      - name: Create a image manifest
        id: image_manifest_local
        env:
          MANIFEST_NAME: zig
        run: |
          image_manifest_local_imageid=$(buildah manifest create \
              --annotation \
              org.opencontainers.image.source="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
              ${GITHUB_REPOSITORY##*/}:${MANIFEST_NAME})
          printf '%s=%s\n' 'imageid' "$image_manifest_local_imageid" >> "$GITHUB_OUTPUT"

      - name: Add image into image manifest
        run: |
          buildah manifest add ${{ steps.image_manifest_local.outputs.imageid }} ${{ steps.image.outputs.digest }}
          buildah images
          buildah manifest inspect ${{ steps.image_manifest_local.outputs.imageid }} # DEBUG: Check for manifest

      - name: Login to GHCR.io
        run: |
          # GitHub-hosted runners already have a ${HOME}/.docker/config.json with a credential which has unlimited pull rate and limit on Docker Hub.
          # Append the new credential to the same file and tell buildah and its friends (podman, skopeo etc.) to use it.
          printf '%s' "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
          printf '%s=%s\n' 'REGISTRY_AUTH_FILE' "${HOME}/.docker/config.json" >> "$GITHUB_ENV"

      - name: Push image manifest to ghcr.io for Sigstore Bundle Format
        id: image_manifest_ghcr
        run: |
          buildah manifest push \
              --digestfile image_manifest_ghcr_digest.txt \
              ${{ steps.image_manifest_local.outputs.imageid }} \
              docker://ghcr.io/${GITHUB_REPOSITORY,,}:${IMAGE_TAG}
          image_manifest_ghcr_digest=$(cat ./image_manifest_ghcr_digest.txt)
          printf '%s=%s\n' 'digest' "$image_manifest_ghcr_digest" >> "$GITHUB_OUTPUT"

      - name: Sign image manifest on ghcr.io
        run: |
          cosign sign \
              --recursive \
              --yes \
              ghcr.io/${GITHUB_REPOSITORY,,}@${{ steps.image_manifest_ghcr.outputs.digest }}

      - name: Verify image manifest with exact identity
        run: |
          cosign verify \
              --certificate-identity="https://github.com/LKHN/sigstore-playground/.github/workflows/slsa_1.0_build_l3_reusable.yaml@refs/heads/main" \
              --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
              ghcr.io/${GITHUB_REPOSITORY,,}:${IMAGE_TAG}

      - name: Verify container image manifest using regexp on identity
        run: |
          cosign verify \
              --certificate-identity-regexp="^${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
              --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
              ghcr.io/${GITHUB_REPOSITORY,,}:${IMAGE_TAG}

      # GitHub Artifact attestations
      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: ${{ steps.zig_release_tarball.outputs.zig_tarball_x86_64_linux_master }}

      - name: Verify attestation of a file artifact
        env:
          GH_TOKEN: ${{ github.token }}
          GH_FORCE_TTY: true
        run: |
          gh attestation verify \
              ${{ steps.zig_release_tarball.outputs.zig_tarball_x86_64_linux_master }} \
              --repo "$GITHUB_REPOSITORY"

      - name: Verify attestation of a file artifacts with reusable workflow
        env:
          GH_TOKEN: ${{ github.token }}
          GH_FORCE_TTY: true
        run: |
          gh attestation verify \
              -o ${GITHUB_REPOSITORY%%/*} \
              --signer-workflow LKHN/sigstore-playground/.github/workflows/slsa_1.0_build_l3_reusable.yaml \
              ${{ steps.zig_release_tarball.outputs.zig_tarball_x86_64_linux_master }}

      - name: Attest Build Provenance
        id: attest_container
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ghcr.io/lkhn/sigstore-playground
          subject-digest: ${{ steps.image_manifest_ghcr.outputs.digest }}
          # push-to-registry: true

      - name: debug provenance
        run: jq '.' ${{ steps.attest_container.outputs.bundle-path }}

      - name: Attest provenance to container
        run: |
          cosign attest \
              --predicate ${{ steps.attest_container.outputs.bundle-path }} \
              --type slsaprovenance \
              ghcr.io/${GITHUB_REPOSITORY,,}@${{ steps.image_manifest_ghcr.outputs.digest }}

      - name: Verify attestation of a container image artifact
        env:
          GH_TOKEN: ${{ github.token }}
          GH_FORCE_TTY: true
        run: |
          gh attestation verify \
              --format=json \
              oci://ghcr.io/${GITHUB_REPOSITORY,,}:${IMAGE_TAG} \
              --repo "$GITHUB_REPOSITORY"

      - name: Verify attestation of a file artifacts with reusable workflow
        env:
          GH_TOKEN: ${{ github.token }}
          GH_FORCE_TTY: true
        run: |
          gh attestation verify \
              -o ${GITHUB_REPOSITORY%%/*} \
              --signer-workflow LKHN/sigstore-playground/.github/workflows/slsa_1.0_build_l3_reusable.yaml \
              oci://ghcr.io/${GITHUB_REPOSITORY,,}:${IMAGE_TAG}

      - name: Convert gh repository to lowercase
        id: github_repository
        run: printf '%s=%s\n' 'lc' "${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Generate SBOM for file
        uses: anchore/sbom-action@v0
        with:
          file: ${{ steps.zig_release_tarball.outputs.zig_tarball_x86_64_linux_master }}

      - name: Generate SBOM for container image
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ steps.github_repository.outputs.lc }}:${{ env.IMAGE_TAG }}

      - name: Logout from ghcr.io
        if: ${{ always() }}
        run: docker logout ghcr.io || true
